<head>
    <meta charset="UTF-8">

    <title>RK 400 Studios | Future of Play</title>
    <style>
        :root {
            --primary: #00f2ff; /* Cyber blue */
            --accent: #7000ff;  /* Neon purple */
            --dark: #0a0a0b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; color: var(--primary); }

        /* Hero Section */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://addons-media.operacdn.com/media/CACHE/images/themes/78/284078/1.0-rev1/images/ad235bfd3d74c726cd871b06bd4b855b/809e258d1e9c54bcdb3d7eab7fb2dd36.jpg');
            background-size: cover;
            background-position: center;
        }

        h1 { font-size: 4rem; margin-bottom: 10px; text-transform: uppercase; }

        .btn {
            padding: 15px 30px;
            background: var(--primary);
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover { background: var(--accent); color: white; transform: scale(1.05); }

        /* Games Grid */
        .games-section { padding: 50px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #1a1a1c;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .game-card:hover { border-color: var(--primary); }
        .game-card img { width: 100%; height: 200px; object-fit: cover; }
        .game-card h3 { padding: 15px; margin: 0; }
    </style>
</head>
